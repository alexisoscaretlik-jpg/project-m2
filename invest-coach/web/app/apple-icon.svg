<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c5bfa"/>
      <stop offset="100%" stop-color="#3b1f8f"/>
    </linearGradient>
  </defs>
  <!-- Apple touch icons are rendered with iOS-applied rounded mask, so we
       fill a full-bleed rect instead of rounding ourselves. -->
  <rect width="180" height="180" fill="url(#g)"/>
  <text x="50%" y="58%" text-anchor="middle" dominant-baseline="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Inter Tight', system-ui, sans-serif"
        font-weight="800" font-size="84" letter-spacing="-4" fill="#ffffff">
    IC
  </text>
</svg>
