services:
  - type: worker
    name: trading-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot_simple.py
    envVars:
      - key: PAPER_TRADING
        value: true
      - key: EMAIL_CHECK_INTERVAL
        value: 60
      - key: BROKER
        value: ibkr
      - key: IBKR_HOST
        value: 127.0.0.1
      - key: IBKR_PORT
        value: 4002
