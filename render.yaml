services:
  - type: cron
    name: invest-coach-worker
    runtime: python
    schedule: "0 6 * * *"
    rootDir: invest-coach/worker
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    envVars:
      - key: SEC_USER_AGENT
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
