services:
  - type: worker
    name: trading-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot_simple.py
    envVars:
      - key: PAPER_TRADING
        value: true
      - key: EMAIL_CHECK_INTERVAL
        value: 60
      - key: BROKER
        value: alpaca
      - key: ALPACA_PAPER
        value: true
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false

  - type: cron
    name: invest-coach-worker
    runtime: python
    plan: free
    schedule: "0 6 * * *"
    rootDir: invest-coach/worker
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    envVars:
      - key: SEC_USER_AGENT
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
